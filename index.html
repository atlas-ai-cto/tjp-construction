  <meta property="og:title" content="Chat met TJP Construction op WhatsApp">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: #25D366;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 40px;
      height: 40px;
      fill: white;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .phone {
      font-size: 20px;
      font-weight: 600;
      color: #25D366;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.2s ease;
      width: 100%;
      margin-bottom: 12px;
    }

    .btn-primary {
      background: #25D366;
      color: white;
    }

    .btn-primary:hover {
      background: #20BA5A;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
    }

    .btn-secondary {
      background: white;
      color: #25D366;
      border: 2px solid #25D366;
    }

    .btn-secondary:hover {
      background: #f0fdf4;
      transform: translateY(-2px);
    }

    .btn svg {
      width: 20px;
      height: 20px;
    }

    .download-link {
      display: inline-block;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e5e5e5;
      width: 100%;
    }

    .download-link p {
      color: #666;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .download-link a {
      color: #25D366;
      font-weight: 600;
      text-decoration: none;
      font-size: 15px;
      transition: color 0.2s;
    }

    .download-link a:hover {
      color: #20BA5A;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #e5e5e5;
    }

    .feature {
      text-align: center;
    }

    .feature-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .feature-text {
      font-size: 12px;
      color: #666;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .container {
        padding: 36px 24px;
      }

      h1 {
        font-size: 24px;
      }

      .phone {
        font-size: 18px;
      }

      .btn {
        padding: 14px 24px;
        font-size: 15px;
      }

      .features {
        gap: 16px;
      }

      .feature-text {
        font-size: 11px;
      }
    }
  </style>
</head>
